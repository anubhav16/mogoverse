<style>
/* Testimonial section */
.testimonials-section {
  background: #1a1a2e;
  padding: 60px 0 48px;
  overflow: hidden;
  position: relative;
}
.testimonials-header {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 60px;
  text-align: center;
  margin-bottom: 32px;
}
.testimonials-eyebrow {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #a78bfa;
  margin-bottom: 12px;
}
.testimonials-heading {
  font-size: 40px;
  font-weight: 900;
  letter-spacing: -1.5px;
  color: white;
  margin-bottom: 8px;
}
.testimonials-heading em {
  font-style: normal;
  color: #a78bfa;
}
.testimonials-hint {
  text-align: center;
  margin-bottom: 16px;
  font-size: 12px;
  color: #666;
  letter-spacing: 1px;
}
/* Track */
.testimonial-track {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding: 0 60px 16px;
  scroll-behavior: smooth;
  cursor: grab;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: #6d28d9 #111;
}
.testimonial-track::-webkit-scrollbar {
  height: 6px;
}
.testimonial-track::-webkit-scrollbar-track {
  background: #111;
  border-radius: 3px;
}
.testimonial-track::-webkit-scrollbar-thumb {
  background: #6d28d9;
  border-radius: 3px;
}
/* Cards */
.testimonial-card {
  min-width: 500px;
  max-width: 500px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 28px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.testimonial-card-quote {
  font-size: 15px;
  color: #ccc;
  line-height: 1.6;
  font-style: italic;
}
.testimonial-card-person {
  display: flex;
  align-items: center;
  gap: 12px;
}
.testimonial-card-photo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.testimonial-card-initials {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #6d28d9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: white;
  flex-shrink: 0;
}
.testimonial-card-name {
  font-size: 14px;
  font-weight: 700;
  color: white;
}
.testimonial-card-title {
  font-size: 12px;
  color: #888;
  margin-top: 2px;
}
/* Scroll arrows */
.testimonial-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
  transition: background 0.2s;
  user-select: none;
}
.testimonial-arrow:hover {
  background: rgba(109,40,217,0.4);
}
.testimonial-arrow-left { left: 12px; }
.testimonial-arrow-right { right: 12px; }
.testimonial-arrow.hidden { opacity: 0; pointer-events: none; }

/* Mobile adjustments */
@media (max-width: 768px) {
  .testimonials-header { padding: 0 20px; }
  .testimonials-heading { font-size: 28px; }
  .testimonial-track { padding: 0 20px 16px; }
  .testimonial-card { min-width: calc(100vw - 56px); max-width: calc(100vw - 56px); }
  .testimonial-arrow { display: none; }
}
</style>

<section id="testimonials" class="testimonials-section">
  <div class="testimonials-header">
    <div class="testimonials-eyebrow">What Leaders Say</div>
    <h2 class="testimonials-heading">The C-Suite on <em>Sonic Branding</em></h2>
  </div>

  <!-- Scroll hint -->
  <div class="testimonials-hint">&#8592; scroll &#8594;</div>

  <!-- Scroll arrows (desktop only) -->
  <div class="testimonial-arrow testimonial-arrow-left hidden" id="testimonialArrowLeft">&#8249;</div>
  <div class="testimonial-arrow testimonial-arrow-right" id="testimonialArrowRight">&#8250;</div>

  <!-- Testimonial track -->
  <div class="testimonial-track" id="testimonialTrack">
    <!-- Cards populated by JS -->
  </div>
</section>

<script>
(function() {
  var _bp = (window.location.pathname.indexOf('/landing-pages/') !== -1 || window.location.pathname.indexOf('/tools/') !== -1 || window.location.pathname.indexOf('/sonic-branding/') !== -1 || window.location.pathname.indexOf('/alternatives/') !== -1) ? '../' : '';

  var testimonials = [
    { name: "Raja Rajamannar", quote: "Audio strategy is no longer a nice to have but a must have for brands.", title: "CMO, Mastercard", photo: "raja-rajamannar.png" },
    { name: "Gaurav Verma", quote: "BrandMusiq created a unique sound encapsulating our brand identity and user interaction.", title: "CMO Branding, Zomato", photo: "gaurav-verma.png" },
    { name: "Phee Teik Yeoh", quote: "We were impressed with BrandMusiq\u2019s holistic approach to sonic branding.", title: "CEO, Vistara", photo: "phee-teik-yeoh.png" },
    { name: "Pallavi Singh", quote: "The MG brand anthem is the perfect embodiment of MG\u2019s ultramodern sensibilities.", title: "Head of Marketing, MG India", photo: "pallavi-singh.png" },
    { name: "Kartik Jain", quote: "The intention is to create an emotional engagement among various stakeholders.", title: "EVP & Head of Marketing, HDFC Bank", photo: "kartik-jain.png" },
    { name: "Shalabh Atray", quote: "If somebody closes their eyes, they should recognize that it is from Rupeek.", title: "Sr. VP, Rupeek", photo: "" },
    { name: "Dhiren Amin", quote: "What they always manage to do is capture the vision of the brand into a sound.", title: "CMO, NTUC Income Singapore", photo: "dhiren-amin.png" }
  ];

  var track = document.getElementById('testimonialTrack');
  var html = '';

  for (var i = 0; i < testimonials.length; i++) {
    var t = testimonials[i];
    var photoHtml;
    if (t.photo) {
      photoHtml = '<img class="testimonial-card-photo" src="' + _bp + 'assets/headshots/' + t.photo + '" alt="' + t.name + '" loading="lazy">';
    } else {
      var initials = t.name.split(' ').map(function(n) { return n[0]; }).join('');
      photoHtml = '<div class="testimonial-card-initials">' + initials + '</div>';
    }

    html += '<div class="testimonial-card">' +
      '<div class="testimonial-card-quote">\u201C' + t.quote + '\u201D</div>' +
      '<div class="testimonial-card-person">' +
        photoHtml +
        '<div>' +
          '<div class="testimonial-card-name">' + t.name + '</div>' +
          '<div class="testimonial-card-title">' + t.title + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }
  track.innerHTML = html;

  /* Scroll arrows */
  var arrowLeft = document.getElementById('testimonialArrowLeft');
  var arrowRight = document.getElementById('testimonialArrowRight');

  function updateArrows() {
    if (track.scrollLeft <= 10) {
      arrowLeft.classList.add('hidden');
    } else {
      arrowLeft.classList.remove('hidden');
    }
    if (track.scrollLeft + track.clientWidth >= track.scrollWidth - 10) {
      arrowRight.classList.add('hidden');
    } else {
      arrowRight.classList.remove('hidden');
    }
  }

  arrowLeft.addEventListener('click', function() {
    track.scrollLeft -= 520;
  });
  arrowRight.addEventListener('click', function() {
    track.scrollLeft += 520;
  });

  track.addEventListener('scroll', updateArrows);
  updateArrows();

  /* Auto-scroll on page scroll */
  var lastScrollY = window.scrollY;
  var userDragging = false;

  window.addEventListener('scroll', function() {
    if (userDragging) return;
    var delta = window.scrollY - lastScrollY;
    lastScrollY = window.scrollY;
    track.scrollLeft += delta * 0.8;
  });

  /* Drag-to-scroll support */
  var startX, scrollStart;
  track.addEventListener('mousedown', function(e) {
    userDragging = true;
    startX = e.pageX;
    scrollStart = track.scrollLeft;
    track.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', function(e) {
    if (!userDragging) return;
    e.preventDefault();
    track.scrollLeft = scrollStart - (e.pageX - startX);
  });
  document.addEventListener('mouseup', function() {
    if (userDragging) {
      userDragging = false;
      track.style.cursor = 'grab';
    }
  });

  /* Touch support */
  track.addEventListener('touchstart', function() { userDragging = true; });
  track.addEventListener('touchend', function() {
    setTimeout(function() { userDragging = false; }, 500);
  });
})();
</script>
